# Local Postgres for IPL Fantasy. Requires Docker Desktop (or compatible engine).
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f db
#
# Data persists in the named volume until you run `docker compose down -v`.

services:
  db:
    image: postgres:16-alpine
    container_name: ipl-fantasy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ipl
      POSTGRES_PASSWORD: iplfantasy_dev
      POSTGRES_DB: ipl_fantasy
    # Host 5433 avoids clashing with a Postgres install already using 5432.
    # Bind to 127.0.0.1 so Prisma/clients using 127.0.0.1 match (avoids localhost → ::1).
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ipl_fantasy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipl -d ipl_fantasy"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 15s

volumes:
  ipl_fantasy_pgdata:
